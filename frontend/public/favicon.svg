<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- AllData mark: a three-node graph triad on a teal rounded square.
       Teal is the dark-theme --color-accent (#14b8a6); a static file can't
       read CSS vars, so the hex is inlined. Derived from <Logo>. -->
