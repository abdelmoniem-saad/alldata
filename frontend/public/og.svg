<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- AllData social card (1200x630). Brand tokens: zinc-black bg (#050505),
       teal accent (#14b8a6), Inter wordmark, the tagline. Source for og.png. -->
  <rect width="1200" height="630" fill="#050505"/>

  <!-- faint dot-grid reticle, echoing the graph canvas -->
  <g fill="#ffffff" fill-opacity="0.05">
    <!-- a sparse grid; enough to read as "measurement surface" without noise -->
    <circle cx="120" cy="120" r="2"/><circle cx="240" cy="120" r="2"/><circle cx="360" cy="120" r="2"/>
    <circle cx="960" cy="160" r="2"/><circle cx="1080" cy="160" r="2"/>
    <circle cx="1020" cy="500" r="2"/><circle cx="1100" cy="430" r="2"/>
    <circle cx="160" cy="520" r="2"/><circle cx="280" cy="500" r="2"/>
  </g>

  <!-- mark -->
  <g transform="translate(96 250)">
    <rect width="96" height="96" rx="27" fill="#14b8a6"/>
    <g transform="translate(18 18) scale(4.28)">
      <circle cx="7" cy="3" r="2" fill="white" fill-opacity="0.9"/>
      <circle cx="3" cy="10" r="2" fill="white" fill-opacity="0.9"/>
      <circle cx="11" cy="10" r="2" fill="white" fill-opacity="0.9"/>
      <line x1="7" y1="5" x2="3.5" y2="8.5" stroke="white" stroke-opacity="0.5" stroke-width="1"/>
      <line x1="7" y1="5" x2="10.5" y2="8.5" stroke="white" stroke-opacity="0.5" stroke-width="1"/>
      <line x1="4.5" y1="10" x2="9.5" y2="10" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="216" y="320"
        font-family="Inter, 'Segoe UI', system-ui, sans-serif"
        font-size="76" font-weight="800" letter-spacing="-2"
        fill="#ffffff">AllData</text>

  <!-- tagline -->
  <text x="98" y="430"
        font-family="'STIX Two Text', Georgia, serif"
        font-size="52" font-weight="700" letter-spacing="-1"
        fill="#ffffff">Statistics is a graph,</text>
  <text x="98" y="498"
        font-family="'STIX Two Text', Georgia, serif"
        font-size="52" font-weight="700" letter-spacing="-1"
        fill="#14b8a6">not a textbook.</text>
</svg>
